name: Notify on Instruction Changes

on:
  push:
    branches: [main]
    paths:
      - '**/instructions.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: '**/instructions.md'

      - name: Build notification message
        if: steps.changed-files.outputs.any_changed == 'true'
        id: build-message
        run: |
          MESSAGE="📋 System instructions updated\n\n"
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            PLATFORM=$(echo "$file" | cut -d'/' -f1)
            TITLE=$(grep 'title:' "$file" | head -1 | sed 's/title: *"\(.*\)"/\1/')
            VERSION=$(grep 'version:' "$file" | head -1 | sed 's/version: *"\(.*\)"/\1/')
            FILE_URL="https://github.com/${{ github.repository }}/blob/main/$file"

            MESSAGE="${MESSAGE}• *${TITLE:-$file}* (v${VERSION:-?})\n"
            MESSAGE="${MESSAGE}  Platform: \`${PLATFORM}\` | <${FILE_URL}|View file>\n"

            # Add platform-specific action
            case "$PLATFORM" in
              elevenlabs)
                MESSAGE="${MESSAGE}  ✅ Auto-deployed to ElevenLabs\n"
                ;;
              gemini-gems)
                MESSAGE="${MESSAGE}  ⚠️ Action required: Copy to Gemini Gems (.com AND .net)\n"
                ;;
              claude)
                MESSAGE="${MESSAGE}  ℹ️ Deploy backend or update Claude.ai Projects\n"
                ;;
              clickup)
                MESSAGE="${MESSAGE}  ⚠️ Action required: Update ClickUp Super Agent\n"
                ;;
            esac
            MESSAGE="${MESSAGE}\n"
          done

          # Add commit info
          MESSAGE="${MESSAGE}Commit: ${{ github.event.head_commit.message }}\n"
          MESSAGE="${MESSAGE}By: ${{ github.event.head_commit.author.name }}"

          # Write message to file for Slack payload
          echo "$MESSAGE" > /tmp/slack-message.txt
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to Slack
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.build-message.outputs.message }}"
            }
